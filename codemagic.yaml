workflows:
  ios-capacitor:
    name: iOS Build for RTB
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Assets (Next.js)
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Build iOS (.app)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/ios
      - name: Package for AltStore (.ipa)
        script: |
          mkdir -p build/ios/Payload
          cp -r build/ios/Build/Products/Debug-iphoneos/App.app build/ios/Payload/
          cd build/ios && zip -r RTB.ipa Payload
    artifacts:
      - build/ios/*.ipa
    publishing:
      email:
        recipients:
          - YOUR_EMAIL_HERE@example.com
